<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Service Hamburger Menu </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar Style -->
        <div class="navbar">
            <!-- Logo section (left side) -->
            <div class="logo">
                <h2>Logo</h2>
            </div>
           <!-- Hamburger -->
            <button class="hamburger">☰</button>   
             <!-- Navigation menu -->
            <div class="menu">
                <a  href="#">Home</a>
                <a  href="#">Services</a>
                <a  href="#">About Us</a>
                <a  href="#">Contact Us</a>
            </div>
            <!-- Username button (Right side) -->
                <button id="user">Username</button>
            </div>
        <!-- Hero Section -->
    <section>
        <div class="content">
            <!-- Left side content -->
            <div id="left">
                <h1>Revitalize Your Clothes with Expert <br><span>Laundry Services!</span> </h1>
                <p>From premium dry cleaning to swift wash and fold, we deliver care and convenience, Schedule a
                pickup and rediscover the freshness of your clothes today!
                </p>
                <button id="btns">Book a service today!</button>
            </div>
            <!-- Right side image -->
            <div id="right"> 
                <img src="https://png.pngtree.com/png-clipart/20240512/original/pngtree-home-service-house-cleaning-and-laundry-wash-png-image_15072816.png" 
                alt="Laundry Service Image">
            </div>
        </div>
    </section>
</body>
</html>
